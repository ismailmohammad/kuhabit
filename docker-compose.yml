services:
  backend:
    build: ./backend
    restart: on-failure
    environment:
      DB_DSN: ${DB_DSN}
      SESSION_SECRET: ${SESSION_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://0.0.0.0}
      PORT: "9090"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}

  frontend:
    build: ./stokely-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
