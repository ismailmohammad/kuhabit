name: Prod CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

  frontend-tests:
    name: Frontend Tests + Build + E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: stokely-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: stokely-frontend
        run: npm ci

      - name: Unit tests
        working-directory: stokely-frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: stokely-frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: stokely-frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke
        working-directory: stokely-frontend
        run: npm run test:e2e

      - name: Prod dependency audit
        working-directory: stokely-frontend
        run: npm audit --omit=dev

  security-checks:
    name: SQL Injection Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: SQL injection guard
        run: ./scripts/check-sql-injection-guard.sh

  build-and-push:
    name: Build + Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests
      - security-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stokely-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stokely-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./stokely-frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stokely-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stokely-frontend:${{ github.sha }}

  deploy-prod:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    environment: production
    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.PROD_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          SSH_USER: ${{ secrets.PROD_SSH_USER }}
          SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          TARGET="${SSH_USER}@${SSH_HOST}"

          ssh -p "$PORT" "$TARGET" "set -euo pipefail; \
            cd \"$DEPLOY_PATH\"; \
            git fetch origin main; \
            git checkout main; \
            git pull --ff-only origin main; \
            export DOCKER_USERNAME=\"$DOCKERHUB_USERNAME\"; \
            docker compose -f docker-compose.prod.yml pull; \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans; \
            docker image prune -f"
