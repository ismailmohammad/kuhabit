services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  backend:
    image: ${DOCKER_USERNAME}/stokely-backend:latest
    restart: on-failure
    environment:
      DB_DSN: ${DB_DSN}
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://stokely.quest}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      PORT: "9090"
      GIN_MODE: release
      COOKIE_SECURE: "true"
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_EMAIL: ${VAPID_EMAIL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-}

  frontend:
    image: ${DOCKER_USERNAME}/stokely-frontend:latest
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
